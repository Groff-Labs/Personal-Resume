name: Deploy infrastructure

# Runs `cdk deploy` for the target stage. Does NOT touch the S3 bucket contents.
#
# Stage mapping:
#   push to dev   → CvWebsite-dev
#   push to main  → CvWebsite-prod
#
# Fires on changes to infrastructure/** or this workflow file. If you change
# the site content only, use deploy-site.yml instead.
#
# The GitHub OIDC role stack (CvWebsite-OIDC) is intentionally NOT deployed
# here. It's a one-time bootstrap and should be deployed manually.

on:
  push:
    branches: [dev, main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Target stage'
        required: true
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-${{ github.event.inputs.stage || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: cdk deploy
    runs-on: ubuntu-latest
    environment: ${{ (github.event.inputs.stage == 'prod' || github.ref == 'refs/heads/main') && 'production' || 'dev' }}
    env:
      STAGE: ${{ github.event.inputs.stage || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/cv-website-github-actions
          aws-region: us-east-1

      - name: Install CDK deps
        working-directory: infrastructure
        run: npm ci

      - name: CDK diff (advisory)
        working-directory: infrastructure
        run: npx cdk diff "CvWebsite-${STAGE}" || true

      - name: CDK deploy
        working-directory: infrastructure
        run: |
          npx cdk deploy "CvWebsite-${STAGE}" \
            --require-approval never \
            --outputs-file outputs.json

      - name: Summary
        working-directory: infrastructure
        run: |
          echo "::notice::✅ Infrastructure deployed: CvWebsite-${STAGE}"
          cat outputs.json | head -40
